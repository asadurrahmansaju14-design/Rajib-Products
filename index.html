<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Stock</title>
<link rel="icon" href="https://i.ibb.co.com/ztvP6X1/1000018091-photoaidcom-cropped-jpg.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
  body{background:#fff;overflow:hidden;}
  .splash{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:linear-gradient(135deg,#ff8ac6,#ffb6e0);
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    color:white;z-index:1000;text-align:center;
    animation:fadeOut 2s ease-out 8s forwards;
  }
  .splash img{width:120px;height:120px;margin-bottom:20px;}
  .splash h1{font-size:2.5rem;margin-bottom:10px;}
  .splash p{font-size:1.2rem;}
  #typewriter{margin-top:20px;font-size:1.3rem;}
  @keyframes fadeOut{to{opacity:0;visibility:hidden;}}

  .container{display:none;justify-content:center;align-items:center;height:100vh;background:#ffe6f2;}
  .auth-box{
    background:#fff;padding:30px;border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);width:350px;text-align:center;position:relative;
  }
  .auth-box img.logo{width:40px;height:40px;position:absolute;top:20px;left:20px;}
  .auth-box h2{color:#ff4da6;margin-top:20px;font-size:1.8rem;}
  input,button{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #ccc;}
  button{background:#ff4da6;color:white;font-weight:bold;border:none;transition:0.3s;cursor:pointer;}
  button:hover{background:#ff1a8c;}
  .toggle-link{color:#ff4da6;cursor:pointer;text-decoration:underline;}
  .form{display:none;}
  .active{display:block;}
  .success-msg{color:green;font-weight:bold;margin-top:10px; font-size: 14px;}
</style>
</head>
<body>

<div class="splash">
  <img src="https://i.ibb.co.com/ztvP6X1/1000018091-photoaidcom-cropped-jpg.png" alt="Logo">
  <h1>Smart Stock</h1>
  <p>✨ আপনার ব্যবসার বিশ্বস্ত সহযাত্রী</p>
  <p id="typewriter"></p>
</div>

<div class="container" id="authContainer">
  <div class="auth-box">
    <img src="https://i.ibb.co.com/ztvP6X1/1000018091-photoaidcom-cropped-jpg.png" class="logo" alt="logo">
    <h2>Smart Stock</h2>

    <div id="loginForm" class="form active">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button id="loginBtn">Login</button>
      <p style="font-size:13px; margin-top:10px;">Don't have an account? <span class="toggle-link" onclick="toggleForm('register')">Create an account</span></p>
      <p id="loginMsg" class="success-msg"></p>
    </div>

    <div id="registerForm" class="form">
      <input type="text" id="regCompanyName" placeholder="Company Name">
      <input type="text" id="regPhoneNumber" placeholder="Phone Number">
      <input type="text" id="regAddress" placeholder="Address">
      <input type="text" id="regLogoUrl" placeholder="Company Logo URL (Optional)">
      <input type="email" id="registerEmail" placeholder="Email">
      <input type="password" id="registerPassword" placeholder="Password">
      <button id="registerBtn">Register</button>
      <p style="font-size:13px; margin-top:10px;">Already have an account? <span class="toggle-link" onclick="toggleForm('login')">Login</span></p>
      <p id="registerMsg" class="success-msg"></p>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAylEnnkfCAg75SfkeRHR4lk74vQnQOE4M",
  authDomain: "business-e835e.firebaseapp.com",
  databaseURL: "https://business-e835e-default-rtdb.firebaseio.com",
  projectId: "business-e835e",
  storageBucket: "business-e835e.firebasestorage.app",
  messagingSenderId: "484357258128",
  appId: "1:484357258128:web:ae6a631dc65c47fa2f9115",
  measurementId: "G-7VS0G2364G"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ✨ Typewriter Effect
const text = "আপনার ব্যবসা হোক আরও সহজ...😇";
let i = 0;
function typeEffect() {
  const target = document.getElementById("typewriter");
  if (target && i < text.length) {
    target.innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 100);
  }
}
typeEffect();

// ⏳ Show Login After Splash
setTimeout(() => {
  document.querySelector('.splash').style.display = 'none';
  document.getElementById('authContainer').style.display = 'flex';
}, 10000);

// 🔄 Toggle Between Forms
window.toggleForm = (form) => {
  document.getElementById('loginForm').classList.remove('active');
  document.getElementById('registerForm').classList.remove('active');
  if (form === 'register') document.getElementById('registerForm').classList.add('active');
  else document.getElementById('loginForm').classList.add('active');
};

// 📝 Register Logic
document.getElementById('registerBtn').addEventListener('click', async () => {
  const email = document.getElementById('registerEmail').value.trim();
  const password = document.getElementById('registerPassword').value.trim();
  const companyName = document.getElementById('regCompanyName').value.trim();
  const phoneNumber = document.getElementById('regPhoneNumber').value.trim();
  const address = document.getElementById('regAddress').value.trim();
  const logoUrl = document.getElementById('regLogoUrl').value.trim();

  if (!email || !password || !companyName) {
    document.getElementById('registerMsg').style.color = "red";
    document.getElementById('registerMsg').innerText = "⚠️ দয়া করে সব প্রয়োজনীয় ঘর পূরণ করুন!";
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const userId = userCredential.user.uid;

    // Save profile to database under the UID
    await set(ref(db, 'users/' + userId + '/profile'), { 
      companyName, 
      phoneNumber, 
      address, 
      logoUrl, 
      email 
    });

    document.getElementById('registerMsg').style.color = "green";
    document.getElementById('registerMsg').innerText = "✅ রেজিষ্ট্রেশন সফল হয়েছে!";
    setTimeout(() => toggleForm('login'), 2000);
  } catch (error) {
    document.getElementById('registerMsg').style.color = "red";
    document.getElementById('registerMsg').innerText = "❌ " + error.message;
  }
});

// 🔑 Login Logic
document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();

  if(!email || !password) {
    document.getElementById('loginMsg').style.color = "red";
    document.getElementById('loginMsg').innerText = "⚠️ ইমেইল এবং পাসওয়ার্ড দিন";
    return;
  }

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const userId = userCredential.user.uid;

    // Fetch user info from database
    const snapshot = await get(child(ref(db), 'users/' + userId + '/profile'));
    
    if (snapshot.exists()) {
      const data = snapshot.val();

      // ✅ [CRITICAL UPDATE] Save UID and Company info locally
      localStorage.setItem("userId", userId); 
      localStorage.setItem("companyData", JSON.stringify({
        name: data.companyName,
        phone: data.phoneNumber,
        address: data.address,
        logo: data.logoUrl
      }));

      document.getElementById('loginMsg').style.color = "green";
      document.getElementById('loginMsg').innerText = `👋 লগ ইন সফল! ${data.companyName} লোড হচ্ছে...`;

      setTimeout(() => {
        window.location.href = "home.html";
      }, 1500);
    } else {
      document.getElementById('loginMsg').style.color = "orange";
      document.getElementById('loginMsg').innerText = "⚠️ ইউজার প্রোফাইল পাওয়া যায়নি!";
    }
  } catch (error) {
    document.getElementById('loginMsg').style.color = "red";
    document.getElementById('loginMsg').innerText = "❌ ইমেইল বা পাসওয়ার্ড ভুল!";
  }
});
</script>
</body>
